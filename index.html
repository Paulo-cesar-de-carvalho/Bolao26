<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Classificação</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <link rel="stylesheet" href="Estilo/principal.css" />
        <script src="js/dados/apostas.js"></script>
        <script src="js/dados/grupos.js"></script>
        <script src="js/dados/id_jogos.js"></script>
        <script src="js/calculos.js"></script>
        <script src="js/jogos.js"></script>
        <script src="js/componente_placar.js"></script>
        <script src="js/componente_barra_navegacao.js"></script>
        <script src="js/pagina_classificacao.js" defer></script>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Bolão da Copa 2026</span>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMain"
                    aria-controls="navbarMain"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarMain"></div>
            </div>
        </nav>
        <div class="container">
            <div id="pagina_geral_temp">
                <center>
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </center>
            </div>
            <div class="escondido" id="pagina_geral">
                <center>
                    <h3 class="titulo">Classificação Geral</h3>
                </center>
                <table class="table table-sm table-striped">
                    <thead>
                        <th>Var</th>
                        <th>Pos</th>
                        <th>Nome</th>
                        <th>Pts</th>
                        <th>Placar</th>
                        <th>Resultado</th>
                    </thead>
                    <tbody id="tbody_geral"></tbody>
                </table>
                <center>
                    <h3 class="titulo">Resultados Oficiais</h3>
                </center>
                <div id="jogos_placar_lista" class="placar_lista"></div>
            </div>
        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
